apiVersion: v1                      # Версия Kubernetes API
kind: Secret                        # Тип ресурса Kubernetes
metadata:                           # Метаданные объекта
  name: db-credentials              # Имя Secret
  namespace: default                # Namespace, где создается Secret
  labels:                           # Метки для идентификации
    app: my-app
type: Opaque                        # Тип секрета (Opaque — универсальный тип)
data:                               # Секретные данные (должны быть base64)
  username: YWRtaW4=                # username = "admin" (base64 encoded)
  password: cGFzc3dvcmQ=            # password = "password" (base64 encoded)
